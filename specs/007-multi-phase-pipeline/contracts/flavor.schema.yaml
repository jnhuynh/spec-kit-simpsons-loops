# JSON Schema (YAML-encoded) for shipped flavor catalogs at phaser/flavors/<name>/flavor.yaml
# Validated by flavor_loader.rb at flavor-load time.

$schema: http://json-schema.org/draft-07/schema#
$id: https://speckit.simpsons.local/schemas/flavor.schema.yaml
title: Flavor
description: A project-specific catalog of task types, isolation rules, precedent rules, inference rules, forbidden operations, and stack-detection signals.
type: object
additionalProperties: false
required:
  - name
  - version
  - default_type
  - task_types
  - precedent_rules
  - inference_rules
  - forbidden_operations
  - stack_detection

properties:
  name:
    type: string
    description: Globally unique flavor identifier. Matches the directory name under phaser/flavors/.
    pattern: ^[a-z][a-z0-9-]*$

  version:
    type: string
    description: Semver version pinned by every manifest produced by this flavor (FR-035).
    pattern: ^[0-9]+\.[0-9]+\.[0-9]+$

  default_type:
    type: string
    description: Task type assigned to commits that match no inference rule (FR-004). MUST be present in task_types.

  allow_parallel_backfills:
    type: boolean
    default: false
    description: Per-flavor override of the FR-037 sequential-by-default rule for multiple backfills.

  inference_module:
    type: string
    description: Optional fully-qualified Ruby module name implementing pattern-matcher methods referenced by inference_rules.

  forbidden_module:
    type: string
    description: Optional fully-qualified Ruby module name implementing forbidden-operation detectors.

  validators:
    type: array
    description: Optional fully-qualified Ruby module names implementing extra validators (e.g., backfill-safety).
    items:
      type: string

  task_types:
    type: array
    minItems: 1
    items:
      $ref: '#/definitions/TaskType'

  precedent_rules:
    type: array
    items:
      $ref: '#/definitions/PrecedentRule'

  inference_rules:
    type: array
    items:
      $ref: '#/definitions/InferenceRule'

  forbidden_operations:
    type: array
    description: Pre-classification gate entries (FR-049). Operator type tags MUST NOT be capable of suppressing these.
    items:
      $ref: '#/definitions/ForbiddenOperation'

  stack_detection:
    $ref: '#/definitions/StackDetection'

definitions:
  TaskType:
    type: object
    additionalProperties: false
    required: [name, isolation, description]
    properties:
      name:
        type: string
        description: Unique within the flavor (e.g., "schema add-nullable-column").
      isolation:
        type: string
        enum: [alone, groups]
        description: alone = own phase (FR-005); groups = may share a phase with other groups-isolation tasks.
      description:
        type: string
        minLength: 1

  PrecedentRule:
    type: object
    additionalProperties: false
    required: [name, subject_type, predecessor_type, error_message]
    properties:
      name:
        type: string
        description: Unique within the flavor (e.g., "drop-column-requires-cleanup").
      subject_type:
        type: string
        description: The type that requires a predecessor.
      predecessor_type:
        type: string
        description: The type that must appear in an earlier phase.
      error_message:
        type: string
        description: Operator-facing message emitted when the rule is violated.

  InferenceRule:
    type: object
    additionalProperties: false
    required: [name, precedence, task_type, match]
    properties:
      name:
        type: string
        description: Unique within the flavor; used as the alphabetic tie-breaker (FR-036).
      precedence:
        type: integer
        minimum: 0
        description: Higher number wins when multiple rules match (FR-036).
      task_type:
        type: string
        description: The type assigned to commits matching this rule.
      match:
        $ref: '#/definitions/Match'

  ForbiddenOperation:
    type: object
    additionalProperties: false
    required: [name, identifier, detector, decomposition_message]
    properties:
      name:
        type: string
        description: Unique within the flavor; surfaces as failing_rule in error records (FR-041).
      identifier:
        type: string
        description: Stable identifier surfaced as forbidden_operation in error records (FR-041).
      detector:
        $ref: '#/definitions/Match'
        description: Detection specification.
      decomposition_message:
        type: string
        minLength: 1
        description: Canonical message naming the safe replacement task sequence (FR-015).

  Match:
    description: One-of variant — exactly one of the four shapes below.
    oneOf:
      - type: object
        additionalProperties: false
        required: [kind, pattern]
        properties:
          kind:
            const: file_glob
          pattern:
            type: string
            minLength: 1
      - type: object
        additionalProperties: false
        required: [kind, pattern]
        properties:
          kind:
            const: path_regex
          pattern:
            type: string
            minLength: 1
      - type: object
        additionalProperties: false
        required: [kind, path_glob, pattern]
        properties:
          kind:
            const: content_regex
          path_glob:
            type: string
            minLength: 1
          pattern:
            type: string
            minLength: 1
      - type: object
        additionalProperties: false
        required: [kind, method]
        properties:
          kind:
            const: module_method
          method:
            type: string
            minLength: 1
            description: Method name on the flavor's inference_module or forbidden_module.

  StackDetection:
    type: object
    additionalProperties: false
    required: [signals]
    properties:
      signals:
        type: array
        items:
          $ref: '#/definitions/Signal'

  Signal:
    description: Either a file_present or file_contains check.
    oneOf:
      - type: object
        additionalProperties: false
        required: [type, path, required]
        properties:
          type:
            const: file_present
          path:
            type: string
            minLength: 1
          required:
            type: boolean
      - type: object
        additionalProperties: false
        required: [type, path, pattern, required]
        properties:
          type:
            const: file_contains
          path:
            type: string
            minLength: 1
          pattern:
            type: string
            minLength: 1
          required:
            type: boolean

# Cross-field rules enforced by flavor_loader.rb beyond what JSON Schema can express:
# - default_type MUST appear in task_types[].name
# - subject_type and predecessor_type MUST appear in task_types[].name
# - inference_rules[].task_type MUST appear in task_types[].name
# - precedent_rule subject MUST NOT equal predecessor (no self-loops)
# - precedent rule graph MUST be acyclic
# - When match.kind = module_method, inference_module (or forbidden_module) MUST be declared and the named method MUST exist
